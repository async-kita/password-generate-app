<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32"
      href="./assets/images/favicon-32x32.png">

    <title>Frontend Mentor | Password generator app</title>
    <link rel="stylesheet" href="./styles/index.css">
  </head>
  <body>
    <main class="password-generator">
      <h1 class="password-generator__title">Password Generator</h1>
      <form
        class="password-generator__form"
        aria-label="Password generation settings">
        <div
          class="password-display" aria-live="polite"
          aria-atomic="true">
          <output
            class="password-display__output is-placeholder"
            id="generated-password"
            for="length uppercase lowercase numbers symbols"
            aria-label="Generated password">
            P4$5W0rD!
          </output>
          <span
            class="password-display__label-copy-btn"
            aria-hidden="true">copied</span>
          <button
            class="password-display__copy-btn"
            type="button"
            aria-label="Copy password to clipboard">
            <svg width="21" height="24" xmlns="http://www.w3.org/2000/svg"><path
                d="M20.341 3.091 17.909.659A2.25 2.25 0 0 0 16.319 0H8.25A2.25 2.25 0 0 0 6 2.25V4.5H2.25A2.25 2.25 0 0 0 0 6.75v15A2.25 2.25 0 0 0 2.25 24h10.5A2.25 2.25 0 0 0 15 21.75V19.5h3.75A2.25 2.25 0 0 0 21 17.25V4.682a2.25 2.25 0 0 0-.659-1.591ZM12.469 21.75H2.53a.281.281 0 0 1-.281-.281V7.03a.281.281 0 0 1 .281-.281H6v10.5a2.25 2.25 0 0 0 2.25 2.25h4.5v1.969a.282.282 0 0 1-.281.281Zm6-4.5H8.53a.281.281 0 0 1-.281-.281V2.53a.281.281 0 0 1 .281-.281H13.5v4.125c0 .621.504 1.125 1.125 1.125h4.125v9.469a.282.282 0 0 1-.281.281Zm.281-12h-3v-3h.451c.075 0 .147.03.2.082L18.667 4.6a.283.283 0 0 1 .082.199v.451Z"
                fill="#A4FFAF" />
            </svg>
          </button>
        </div>
        <fieldset
          class="password-options"
          aria-labelledby="options-legend">
          <legend
            class="visually-hidden"
            id="options-legend">
            Password options
          </legend>
          <div class="password-options__length">
            <label
              class="password-options__length-label"
              for="length">
              Character Length <span class="length-value"
                id="length-value">10</span>
            </label>
            <input
              id="length"
              type="range"
              name="length"
              min="0"
              max="20"
              value="10"
              step="1"
              aria-valuemin="0"
              aria-valuemax="20"
              aria-valuenow="10"
              aria-valuetext="10 symbols"
              aria-labelledby="length-label">
            <span id="length-label" hidden>
              Select a password length from 0 to 20 characters
            </span>
          </div>

          <fieldset
            class="password-options__checkboxes"
            aria-label="Character types">
            <legend class="visually-hidden">What characters to include</legend>
            <div class="checkbox-group">
              <input
                type="checkbox"
                id="uppercase"
                name="uppercase"
                checked>
              <label for="uppercase">Include Uppercase Letters</label>
            </div>
            <div class="checkbox-group">
              <input
                type="checkbox"
                id="lowercase"
                name="lowercase"
                checked>
              <label for="lowercase">Include Lowercase Letters</label>
            </div>
            <div class="checkbox-group">
              <input
                type="checkbox"
                id="numbers"
                name="numbers">
              <label for="numbers">Include Numbers</label>
            </div>
            <div class="checkbox-group">
              <input
                type="checkbox"
                id="symbols"
                name="symbols">
              <label for="symbols">Include Symbols</label>
            </div>
          </fieldset>
          <div
            class="password-strength"
            aria-live="polite"
            aria-atomic="true">
            <div class="password-strength__wrapper">
              <p
                class="password-strength__label"
                id="strength-label">
                Strength
              </p>
              <div class="password-strength__wrapper-meter">
                <span
                  class="password-strength__text"
                  aria-hidden="true">MEDIUM</span>
                <div
                  class="password-strength__meter"
                  role="meter"
                  aria-labelledby="strength-label"
                  aria-valuenow="2"
                  aria-valuemin="0"
                  aria-valuemax="4"
                  aria-valuetext="MEDIUM">
                  <span class="meter-bar" data-level="1"></span>
                  <span class="meter-bar" data-level="2"></span>
                  <span class="meter-bar" data-level="3"></span>
                  <span class="meter-bar" data-level="4"></span>
                </div>
              </div>
            </div>
            <button
              class="generate-btn"
              type="submit">
              Generate
              <svg width="12" height="12"
                xmlns="http://www.w3.org/2000/svg"><path
                  fill="#24232C"
                  d="m5.106 12 6-6-6-6-1.265 1.265 3.841 3.84H.001v1.79h7.681l-3.841 3.84z" /></svg>
            </button>
          </div>
        </fieldset>
      </form>
    </main>
  </body>
</html>
